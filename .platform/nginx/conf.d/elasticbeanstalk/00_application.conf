# Bundles EasyAdmin : noms de fichiers hashés → cache long + immutable
location ~* ^/bundles/.+\.(css|js)$ {
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
}

# CSS / JS / images sous public/assets/ — navigateur peut réutiliser (PagesSpeed « cache TTL »)
location ~* ^/assets/.+\.(css|js|woff2?|ttf|otf|eot|svg|ico|png|jpg|jpeg|gif|webp|webmanifest|map)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    try_files $uri =404;
}

# Front-controller Symfony — pas de directive « root » ici (déjà défini par la plateforme EB / document_root).
location / {
    try_files $uri /index.php$is_args$args;
}
